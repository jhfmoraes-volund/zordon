steps:
  - id: Build
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker build --no-cache \
          --build-arg NEXT_PUBLIC_SUPABASE_URL="${_NEXT_PUBLIC_SUPABASE_URL}" \
          --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${_NEXT_PUBLIC_SUPABASE_ANON_KEY}" \
          -t "southamerica-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/zordon/zordon:$COMMIT_SHA" \
          -f Dockerfile .

  - id: Push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - southamerica-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/zordon/zordon:$COMMIT_SHA

  - id: Deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy zordon \
          --image="southamerica-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/zordon/zordon:$COMMIT_SHA" \
          --region=southamerica-east1 \
          --project=$PROJECT_ID \
          --min-instances=0 \
          --set-env-vars='^@^NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}@NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}@SUPABASE_SERVICE_ROLE_KEY=${_SUPABASE_SERVICE_ROLE_KEY}@RESEND_API_KEY=${_RESEND_API_KEY}@TAVILY_API_KEY=${_TAVILY_API_KEY}@OPENROUTER_API_KEY=${_OPENROUTER_API_KEY}@COMPOSIO_API_KEY=${_COMPOSIO_API_KEY}@COMPOSIO_GDRIVE_AUTH_CONFIG_ID=${_COMPOSIO_GDRIVE_AUTH_CONFIG_ID}@COMPOSIO_GITHUB_AUTH_CONFIG_ID=${_COMPOSIO_GITHUB_AUTH_CONFIG_ID}@COMPOSIO_GSHEETS_AUTH_CONFIG_ID=${_COMPOSIO_GSHEETS_AUTH_CONFIG_ID}@COMPOSIO_NOTION_AUTH_CONFIG_ID=${_COMPOSIO_NOTION_AUTH_CONFIG_ID}@CRON_SECRET=${_CRON_SECRET}@PM_REVIEW_REFRESH_AUTH_TOKEN=${_PM_REVIEW_REFRESH_AUTH_TOKEN}@APP_URL=${_APP_URL}'
        gcloud run services update-traffic zordon \
          --to-latest \
          --region=southamerica-east1 \
          --project=$PROJECT_ID

images:
  - southamerica-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/zordon/zordon:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _NEXT_PUBLIC_SUPABASE_URL: ""
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: ""
  _SUPABASE_SERVICE_ROLE_KEY: ""
  _RESEND_API_KEY: ""
  _TAVILY_API_KEY: ""
  _OPENROUTER_API_KEY: ""
  _COMPOSIO_API_KEY: ""
  # Auth Configs do Composio (ac_...) — valores reais vão no trigger do Cloud Build
  _COMPOSIO_GDRIVE_AUTH_CONFIG_ID: ""
  _COMPOSIO_GITHUB_AUTH_CONFIG_ID: ""
  _COMPOSIO_GSHEETS_AUTH_CONFIG_ID: ""
  _COMPOSIO_NOTION_AUTH_CONFIG_ID: ""
  # Shared secret do cron da Wiki (x-cron-secret) — valor real no trigger,
  # mesmo valor seedado no Vault como wiki_daily_cron_secret
  _CRON_SECRET: ""
  # Bearer do cron do PM Review (Authorization: Bearer) — valor real no trigger,
  # MESMO valor seedado no Vault como pm_review_refresh_auth_token (64 chars).
  # Sem isso a rota /api/cron/pm-review-refresh dá 500 "token missing".
  # NOTA: a rota /api/cron/run-granola-import REUSA este mesmo token (o import do
  # Granola alimenta o PM Review) — não precisa de secret próprio.
  _PM_REVIEW_REFRESH_AUTH_TOKEN: ""
  # URL pública do app (não-secreta). Usada por APP_URL nos adapters de
  # context-source (Composio OAuth callbacks etc.) — sem ela caíam em
  # http://localhost:3000 em prod. Default = prod; trigger override p/ staging.
  _APP_URL: "https://zordon.volund.com.br"
